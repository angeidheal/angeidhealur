# Build Configuration
# Technical settings for Jekyll build process
markdown: kramdown
permalink: /:year-:month-:day-:title/
paginate: 12
paginate_path: /duilleag-:num/

# Plugin Configuration
# Jekyll plugins used by the site
plugins:
  - jekyll-paginate
  - jekyll-feed

# Collections Configuration
# Custom collections for different types of content
collections:
  # Gaelic dictionary collection
  faclair:
    output: true
    permalink: /:path/
  # Irish dictionary collection
  focloir:
    output: true
    permalink: /:path/
  # Manx dictionary collection
  fockleyr:
    output: true
    permalink: /:path/
  # General glossary collection
  glossary:
    output: true
    permalink: /:path/