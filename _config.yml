# Site Information
# Basic site settings and metadata
title: Faclair nan Gèidheal
description: Faclair de bhriathrachas LGDTC+ Gàidhlig
brand: An Gèidheal Ùr
brand-link: https://angeidhealur.scot/
brand-tagline: Geàrr-chunntas sgrìobhte de naidheachdan LGDTCEN+ ionadail, nàiseanta 's bho air feadh an t-saoghail.

# URL Configuration
# Base URL settings for the site
# baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://faclair.lgbt" # the base hostname & protocol for your site

# Content Settings
# How content is displayed and organized
excerpt_separator: <!--more-->

# Author Information
# Details about the site author
author-name: Crìstean MacMhìcheil
author-website: "https://criomagan.scot"

# Social Media Links
# External social media and contact information
mastodon: https://abairthusa.scot/@angeidhealur
instagram: https://www.instagram.com/angeidhealur
threads: https://www.threads.net/@angeidhealur
