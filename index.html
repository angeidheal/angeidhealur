---
layout: page
permalink: /
---

<ul>
   {% for post in site.posts %}
     <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
     <p>{{ post.date | date: "%B %d, %Y" }}</p>
     <img src="{{ site.baseurl }}{{ post.image }}" alt="{{ post.title }}" />
     {{ post.content }}
     <br/>
     <h1 style="text-align: center;">• • •</h1>
     <br/>
   {% endfor %}
 </ul>
